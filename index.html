<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경기도 주요 도시 실시간 날씨</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --accent-color: #3b82f6;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .weather-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        /* 도시 선택기 스타일 */
        .selector-container {
            margin-bottom: 20px;
        }

        .city-select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            background-color: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .city-select:focus {
            border-color: var(--accent-color);
        }

        .location {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .base-time {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 25px;
        }

        .main-temp {
            font-size: 4rem;
            font-weight: 800;
            color: var(--accent-color);
            margin: 20px 0;
            line-height: 1;
        }

        .weather-state {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 30px;
            background: #e0f2fe;
            color: #0369a1;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            border-top: 1px solid #eeeeee;
            padding-top: 25px;
        }

        .info-item {
            background: #fafafa;
            padding: 12px;
            border-radius: 12px;
            text-align: left;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .loading {
            font-size: 1.1rem;
            color: var(--text-sub);
            padding: 40px 0;
        }

        .error-msg {
            color: #ef4444;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <div class="selector-container">
            <select id="city-selector" class="city-select">
                </select>
        </div>

        <div id="weather-content">
            <div class="loading" id="status-message">날씨 데이터를 가져오는 중입니다...</div>
        </div>
    </div>

    <script>
        // API 기본 설정
        const BASE_URL = 'https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst';
        const SERVICE_KEY = 'OaRLlfpKOXJH%2BFeghkAojoaSAQbb1bkFF9COvGfjixpiLkEYTHFLqIcBYqFb0HCrcX8H3A47X9QNiRpgcCXAOA%3D%3D';

        // 경기도 주요 도시 및 기상청 격자 좌표(NX, NY) 매핑 데이터
        const CITY_LIST = [
            { name: '광명시', nx: '58', ny: '125' },
            { name: '수원시', nx: '60', ny: '121' },
            { name: '성남시', nx: '63', ny: '122' },
            { name: '고양시', nx: '57', ny: '128' },
            { name: '용인시', nx: '64', ny: '120' },
            { name: '부천시', nx: '57', ny: '125' },
            { name: '안산시', nx: '58', ny: '121' },
            { name: '안양시', nx: '59', ny: '123' },
            { name: '평택시', nx: '62', ny: '114' },
            { name: '의정부시', nx: '61', ny: '128' },
            { name: '화성시', nx: '57', ny: '119' },
            { name: '파주시', nx: '56', ny: '131' },
            { name: '김포시', nx: '55', ny: '126' },
            { name: '광주시', nx: '65', ny: '123' },
            { name: '이천시', nx: '68', ny: '119' }
        ];

        // 기상청 가이드에 맞춘 실시간 실황 시간 계산 함수
        function getBaseDateTime() {
            const now = new Date();
            let year = now.getFullYear();
            let month = String(now.getMonth() + 1).padStart(2, '0');
            let date = String(now.getDate()).padStart(2, '0');
            let hours = now.getHours();
            let minutes = now.getMinutes();

            // 초단기실황은 매시 40분에 생성되므로, 40분 이전이면 '이전 시간' 데이터를 조회
            if (minutes < 40) {
                if (hours === 0) {
                    const yesterday = new Date(now.setDate(now.getDate() - 1));
                    year = yesterday.getFullYear();
                    month = String(yesterday.getMonth() + 1).padStart(2, '0');
                    date = String(yesterday.getDate()).padStart(2, '0');
                    hours = 23;
                } else {
                    hours -= 1;
                }
            }

            const base_date = `${year}${month}${date}`;
            const base_time = `${String(hours).padStart(2, '0')}00`;

            return { base_date, base_time, displayTime: `${hours}:00` };
        }

        // 풍향 각도를 한글 방위로 변환하는 함수
        function getWindDirection(deg) {
            if (deg === undefined || isNaN(deg)) return '-';
            const index = Math.floor((deg + 22.5) / 45) % 8;
            const directions = ['북풍', '북동풍', '동풍', '남동풍', '남풍', '남서풍', '서풍', '북서풍'];
            return directions[index];
        }

        // 날씨 데이터를 가져와 UI를 업데이트하는 핵심 함수
        async function fetchWeather(cityName, nx, ny) {
            const contentArea = document.getElementById('weather-content');
            
            // 로딩 상태 표시
            contentArea.innerHTML = `<div class="loading" id="status-message">${cityName} 날씨 데이터를 가져오는 중입니다...</div>`;
            
            const { base_date, base_time, displayTime } = getBaseDateTime();
            const url = `${BASE_URL}?serviceKey=${SERVICE_KEY}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${base_date}&base_time=${base_time}&nx=${nx}&ny=${ny}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('네트워크 응답에 문제가 있습니다.');
                
                const data = await response.json();
                
                if (data.response.header.resultCode !== '00') {
                    throw new Error(data.response.header.resultMsg);
                }

                const items = data.response.body.items.item;
                const weatherData = {};
                items.forEach(item => {
                    weatherData[item.category] = parseFloat(item.obsrValue);
                });

                // 강수 형태(PTY) 텍스트 매핑
                const ptyMap = { 0: '맑음/구름', 1: '비', 2: '비/눈', 3: '눈', 5: '빗방울', 6: '빗방울눈날림', 7: '눈날림' };
                const ptyValue = weatherData['PTY'] || 0;
                let stateText = ptyMap[ptyValue] || '정보 없음';

                if (ptyValue === 0) {
                    if (weatherData['T1H'] >= 30) stateText = '무더위';
                    else if (weatherData['T1H'] <= 0) stateText = '추위';
                    else stateText = '쾌적함/맑음';
                }

                // 동적 카드 데이터 삽입
                contentArea.innerHTML = `
                    <div class="location">경기도 ${cityName}</div>
                    <div class="base-time">기상청 발표 실황 (${displayTime} 기준)</div>
                    
                    <div class="main-temp">${weatherData['T1H']}°C</div>
                    <div class="weather-state">${stateText}</div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">습도</div>
                            <div class="info-value">${weatherData['REH']}%</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">시간당 강수량</div>
                            <div class="info-value">${weatherData['RN1']}mm</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">풍향</div>
                            <div class="info-value">${getWindDirection(weatherData['VEC'])}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">풍속</div>
                            <div class="info-value">${weatherData['WSD']}m/s</div>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error(error);
                contentArea.innerHTML = `
                    <div class="loading error-msg" id="status-message">
                        ${cityName} 날씨 정보를 불러오지 못했습니다.<br>(${error.message})
                    </div>
                `;
            }
        }

        // 초기화 함수
        function init() {
            const selector = document.getElementById('city-selector');
            
            // 1. 드롭다운 메뉴 생성
            CITY_LIST.forEach((city, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = city.name;
                selector.appendChild(option);
            });

            // 2. 드롭다운 변경 이벤트 리스너 등록
            selector.addEventListener('change', (e) => {
                const selectedCity = CITY_LIST[e.target.value];
                fetchWeather(selectedCity.name, selectedCity.nx, selectedCity.ny);
            });

            // 3. 첫 번째 도시(광명시) 기본값으로 첫 호출
            const defaultCity = CITY_LIST[0];
            fetchWeather(defaultCity.name, defaultCity.nx, defaultCity.ny);
        }

        // 앱 로드 시 실행
        init();
    </script>
</body>
</html>
